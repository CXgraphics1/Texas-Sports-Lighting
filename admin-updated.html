<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • Texas Sports Lighting</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
<!-- Quill (rich text editor) -->
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
  <style>
    .admin-wrap { max-width: 980px; margin: 0 auto; padding: 2rem 1rem; }
    .admin-grid { display: grid; gap: 1rem; grid-template-columns: 1fr; }
    .admin-row { display:flex; gap: .75rem; flex-wrap: wrap; align-items:center; justify-content: space-between; }
    .admin-row .btn { white-space: nowrap; }
    .admin-list .card { cursor: pointer; }
    textarea.input { min-height: 220px; }

    /* Quill editor to feel like the site's inputs */
    .ql-toolbar.ql-snow, .ql-container.ql-snow { border-color: rgba(0,0,0,.12); }
    .ql-toolbar.ql-snow { border-radius: 12px 12px 0 0; background: rgba(255,255,255,.9); }
    .ql-container.ql-snow { border-radius: 0 0 12px 12px; background: #fff; }
    .ql-editor { min-height: 260px; font-size: 1rem; line-height: 1.7; }
    /* Keep blog post content looking like your post page */
    .editor-preview .content h1, .editor-preview .content h2, .editor-preview .content h3 { margin: .9em 0 .4em; }
    .editor-preview .content p { margin: .65em 0; }
    .editor-preview .content img { max-width: 100%; height: auto; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-row">
      <h1 class="title" style="margin:0;">Blog Admin</h1>
      <div class="cluster">
        <button id="newBtn" class="btn">New Post</button>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>
    </div>

    <div id="loginCard" class="card" style="margin-top:1rem;">
      <h2 class="card-title">Login</h2>
      <p class="muted">Enter the admin password.</p>
      <div class="row">
        <input id="pw" class="input" type="password" placeholder="Password">
        <button id="loginBtn" class="btn btn-cta">Login</button>
      </div>
      <p id="loginStatus" class="muted small" style="display:none;"></p>
    </div>

    <div id="app" style="display:none; margin-top:1rem;" class="admin-grid">
      <div class="card">
        <h2 class="card-title">Posts</h2>
        <div id="posts" class="grid cards admin-list"></div>
      </div>

      <div class="card">
        <h2 class="card-title" id="editorTitle">Editor</h2>

        <input id="postId" type="hidden" />
        <div class="row">
          <input id="title" class="input" placeholder="Title *">
          <input id="slug" class="input" placeholder="Slug (auto)">
        </div>
        <div class="row">
          <input id="excerpt" class="input" placeholder="Excerpt (optional)">
          <select id="published" class="input">
            <option value="true">Published</option>
            <option value="false">Draft</option>
          </select>
        </div>

        <div class="row">
          <input id="imageFile" class="input" type="file" accept="image/*">
          <button id="uploadBtn" class="btn">Upload Image</button>
          </div>
        <p class="muted small" id="uploadStatus" style="display:none;"></p>

        <div class="row" style="align-items:flex-start; gap:1rem;">
  <div style="flex:1; min-width: 280px;">
    <div class="muted small" style="margin:.25rem 0 .5rem;">
      Format your post like a normal editor (no HTML needed). Use the toolbar for headings, lists, quotes, links, and images.
    </div>

    <div id="toolbar">
      <span class="ql-formats">
        <select class="ql-header">
          <option selected></option>
          <option value="2"></option>
          <option value="3"></option>
        </select>
      </span>
      <span class="ql-formats">
        <button class="ql-bold"></button>
        <button class="ql-italic"></button>
        <button class="ql-underline"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-blockquote"></button>
        <button class="ql-list" value="ordered"></button>
        <button class="ql-list" value="bullet"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-link"></button>
        <button class="ql-image"></button>
      </span>
      <span class="ql-formats">
        <button class="ql-clean"></button>
      </span>
    </div>

    <div id="quill" aria-label="Post content editor"></div>

    <!-- Hidden field used by the existing save API (stores HTML generated by Quill) -->
    <textarea id="content" class="input" style="display:none;"></textarea>
  </div>

  <div class="card editor-preview" style="flex:1; min-width: 280px; margin:0;">
    <h3 class="card-title" style="margin-top:0;">Live Preview</h3>
    <div id="preview" class="content"></div>
  </div>
</div>

        <div class="admin-row" style="margin-top:.75rem;">
          <p id="saveStatus" class="muted small" style="display:none;"></p>
          <div class="cluster">
            <button id="deleteBtn" class="btn" style="display:none;">Delete</button>
            <button id="saveBtn" class="btn btn-cta">Save</button>
          </div>
        </div>

        <p class="muted small" style="margin-top:.75rem;">
          Tip: Slug becomes the URL like <code>/resources/post.html?slug=your-slug</code>
        </p>
      </div>
    </div>
  </div>


<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
<script>
(function () {
  const el = (id) => document.getElementById(id);

  const loginCard = el("loginCard");
  const app = el("app");
  const loginStatus = el("loginStatus");
  const saveStatus = el("saveStatus");
  const postsEl = el("posts");
  const uploadStatus = el("uploadStatus");

  const state = { posts: [] };

// ---------- QUILL (RICH TEXT EDITOR) ----------
const quill = new Quill("#quill", {
  theme: "snow",
  modules: {
    toolbar: {
      container: "#toolbar",
      handlers: {
        image: () => {
          const url = prompt("Paste an image URL (or use the Upload Image button):");
          if (!url) return;
          const caption = prompt("Optional caption (leave blank for none):") || "";
          const alt = caption || "Blog image";
          const figure = caption
            ? `<figure class="post-figure"><img src="${url}" alt="${alt}" class="post-img"><figcaption class="img-caption">${caption}</figcaption></figure>`
            : `<p><img src="${url}" alt="${alt}" class="post-img"></p>`;

          const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
          quill.clipboard.dangerouslyPasteHTML(range.index, figure);
          quill.setSelection(range.index + 1, 0);
        }
      }
    }
  }
});

function syncFromQuill() {
  // Quill always has some HTML; normalize empty to ""
  const html = (quill.root.innerHTML || "").trim();
  el("content").value = (html === "<p><br></p>") ? "" : html;
  // Preview in the same styled container as your blog page
  el("preview").innerHTML = el("content").value;
}

function setQuillHTML(html) {
  const safe = (html || "").trim();
  quill.root.innerHTML = safe || "";
  syncFromQuill();
}

quill.on("text-change", syncFromQuill);

  function show(elm, on) { elm.style.display = on ? "" : "none"; }
  function status(node, msg, isErr) {
    node.style.display = "block";
    node.textContent = msg;
    node.style.color = isErr ? "#b42318" : "";
  }

  function slugify(s) {
    return (s || "")
      .toLowerCase()
      .trim()
      .replace(/['"]/g, "")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  async function api(path, opts) {
    const r = await fetch(path, {
      headers: { "Content-Type": "application/json" },
      ...opts
    });
    return { ok: r.ok, json: await r.json().catch(() => ({})) };
  }

  async function refresh() {
    const r = await fetch("/api/posts");
    if (!r.ok) return;
    const data = await r.json();
    state.posts = data.posts || [];
    renderPosts();
  }

  function renderPosts() {
    postsEl.innerHTML = "";
    state.posts.forEach(p => {
      const a = document.createElement("article");
      a.className = "card";
      a.innerHTML = `
        <h3 class="card-title">${p.title}</h3>
        <p class="muted small">${p.published ? "Published" : "Draft"} • ${new Date(p.published_at).toLocaleDateString()}</p>
        <p class="muted">${(p.excerpt || "").slice(0, 120)}</p>
      `;
      a.addEventListener("click", () => loadIntoEditor(p));
      postsEl.appendChild(a);
    });
  }

  function clearEditor() {
    el("postId").value = "";
    el("title").value = "";
    el("slug").value = "";
    el("excerpt").value = "";
    el("published").value = "true";
    el("content").value = "";
    setQuillHTML("");
    show(el("deleteBtn"), false);
    el("editorTitle").textContent = "Editor";
    uploadStatus.style.display = "none";
  }

  function loadIntoEditor(p) {
    el("postId").value = p.id;
    el("title").value = p.title || "";
    el("slug").value = p.slug || "";
    el("excerpt").value = p.excerpt || "";
    el("published").value = String(!!p.published);
    el("content").value = p.content || "";
    setQuillHTML(el("content").value);
    show(el("deleteBtn"), true);
    el("editorTitle").textContent = "Editing: " + (p.title || "");
    uploadStatus.style.display = "none";
  }

  el("title").addEventListener("input", () => {
    if (!el("postId").value) el("slug").value = slugify(el("title").value);
  });

  // ---------- LOGIN ----------
  el("loginBtn").addEventListener("click", async () => {
    const password = el("pw").value;
    const { ok, json } = await api("/api/admin/login", {
      method: "POST",
      body: JSON.stringify({ password })
    });

    if (!ok) return status(loginStatus, json.error || "Login failed.", true);

    show(loginCard, false);
    show(app, true);
    clearEditor();
    await refresh();
  });

  el("logoutBtn").addEventListener("click", async () => {
    await fetch("/api/admin/logout");
    location.reload();
  });

  el("newBtn").addEventListener("click", () => {
    clearEditor();
    el("editorTitle").textContent = "New Post";
  });

  // ---------- SAVE ----------
  el("saveBtn").addEventListener("click", async () => {
    status(saveStatus, "Saving...", false);

    syncFromQuill();

    const payload = {
      title: el("title").value.trim(),
      slug: (el("slug").value.trim() || slugify(el("title").value)),
      excerpt: el("excerpt").value.trim(),
      published: el("published").value === "true",
      content: el("content").value.trim()
    };

    if (!payload.title || !payload.slug || !payload.content) {
      return status(saveStatus, "Title, slug, and content are required.", true);
    }

    const id = el("postId").value.trim();

    // CREATE
    if (!id) {
      const { ok, json } = await api("/api/posts", {
        method: "POST",
        body: JSON.stringify(payload)
      });

      if (!ok) return status(saveStatus, json.error || "Create failed.", true);

      status(saveStatus, "Saved!", false);
      await refresh();

      if (json.post && json.post.id) loadIntoEditor(json.post);
      return;
    }

    // UPDATE
    const { ok, json } = await api(`/api/post?id=${encodeURIComponent(id)}`, {
      method: "PUT",
      body: JSON.stringify(payload)
    });

    if (!ok) return status(saveStatus, json.error || "Update failed.", true);

    status(saveStatus, "Updated!", false);
    await refresh();

    if (json.post) loadIntoEditor(json.post);
  });

  // ---------- DELETE ----------
  el("deleteBtn").addEventListener("click", async () => {
    const id = el("postId").value;
    if (!id) return;

    if (!confirm("Delete this post?")) return;

    const { ok, json } = await api(`/api/post?id=${encodeURIComponent(id)}`, { method: "DELETE" });
    if (!ok) return alert(json.error || "Delete failed.");

    clearEditor();
    await refresh();
  });

  // ---------- UPLOAD IMAGE ----------
  function setUploadStatus(msg, isErr) {
    uploadStatus.style.display = "block";
    uploadStatus.textContent = msg;
    uploadStatus.style.color = isErr ? "#b42318" : "";
  }

  el("uploadBtn").addEventListener("click", async () => {
    const fileInput = el("imageFile");
    const f = fileInput.files && fileInput.files[0];
    if (!f) return setUploadStatus("Choose an image first.", true);

    setUploadStatus("Uploading...", false);

    const fd = new FormData();
    fd.append("file", f);

    const r = await fetch("/api/upload", { method: "POST", body: fd });
    const json = await r.json().catch(() => ({}));

    if (!r.ok) return setUploadStatus(json.error || "Upload failed.", true);

    const url = json.url;

    // Insert image tag into content textarea (THIS is what gets saved to the table)
    const defaultCaption = "Add image caption here";

    const tag = `
    <figure class="post-figure">
      <img src="${url}" alt="${defaultCaption}" class="post-img">
      <figcaption class="img-caption">${defaultCaption}</figcaption>
    </figure>
    `;
const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
quill.clipboard.dangerouslyPasteHTML(range.index, tag);
quill.setSelection(range.index + 1, 0);
syncFromQuill();

    setUploadStatus("Uploaded + inserted. Now click Save.", false);
    fileInput.value = "";
  });

})();
</script>
</body>
</html>
